<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safari Plains - Media Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
  <div class="editor-shell">
    <aside class="editor-sidebar">
      <header class="sidebar-head">
        <p class="eyebrow">Lodge Lens Editor</p>
        <h1>Safari Plains</h1>
        <p class="sub">Drone footage first - curate hero clips vs rough BTS, then phone assets.</p>
      </header>

      <nav class="source-tabs" aria-label="Source device">
        <button type="button" class="source-tab active" data-source="drone">Drone</button>
        <button type="button" class="source-tab" data-source="phone">Phone</button>
        <button type="button" class="source-tab" data-source="all">All</button>
      </nav>

      <section class="sidebar-stats" id="stats-panel"></section>

      <nav class="sidebar-nav" aria-label="Filters">
        <h2>View by</h2>
        <button type="button" class="filter-btn active" data-filter="drone_tier">Drone tier</button>
        <button type="button" class="filter-btn" data-filter="bucket">Site buckets</button>
        <button type="button" class="filter-btn" data-filter="category">Visual category</button>
        <button type="button" class="filter-btn" data-filter="decision">Editor decision</button>
      </nav>

      <div class="sidebar-filters" id="filter-list"></div>

      <section class="sidebar-actions">
        <h2>Decisions</h2>
        <label class="check-row"><input type="checkbox" id="hide-removed" checked> Hide removed</label>
        <button type="button" class="btn btn-secondary" id="btn-export">Export decisions JSON</button>
        <button type="button" class="btn btn-ghost" id="btn-reset">Reset all decisions</button>
      </section>
    </aside>

    <main class="editor-main">
      <header class="main-toolbar">
        <div class="toolbar-left">
          <input type="search" id="search" placeholder="Search filename..." aria-label="Search">
          <select id="kind-filter" aria-label="Media type">
            <option value="all">All types</option>
            <option value="video">Videos (&gt;4s)</option>
            <option value="photo">Photos</option>
            <option value="live-photo">Live photos (≤4s)</option>
          </select>
        </div>
        <div class="toolbar-right">
          <span class="pill" id="visible-count">0 visible</span>
          <span class="pill pill-keep" id="keep-count">0 keep</span>
          <span class="pill pill-review" id="review-count">0 review</span>
          <span class="pill pill-remove" id="remove-count">0 remove</span>
        </div>
      </header>

      <div id="content-area" class="content-area"></div>
    </main>
  </div>

  <dialog id="detail-dialog" class="detail-dialog">
    <form method="dialog" class="detail-inner">
      <header class="detail-head">
        <h2 id="detail-title">Asset</h2>
        <button type="submit" class="dialog-close" aria-label="Close">Close</button>
      </header>
      <div class="detail-body" id="detail-body"></div>
    </form>
  </dialog>

  <script src="editor.js" type="module"></script>
</body>
</html>
