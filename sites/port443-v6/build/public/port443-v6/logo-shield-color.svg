    <circle cx="40" cy="70" r="1.4"/>
    <circle cx="40" cy="88" r="1.4"/>
    <circle cx="100" cy="50" r="1.4"/>
    <circle cx="100" cy="70" r="1.4"/>
    <circle cx="100" cy="88" r="1.4"/>
    <circle cx="58" cy="110" r="1.4"/>
    <circle cx="70" cy="114" r="1.4"/>
    <circle cx="82" cy="110" r="1.4"/>
