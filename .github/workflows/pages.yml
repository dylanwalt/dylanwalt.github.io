name: Deploy website rebuilds

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/*/build/package-lock.json
      - uses: actions/configure-pages@v6
      - name: Validate Elevated Walt Media
        run: pwsh elevated-walt-media/scripts/validate-site.ps1
      - run: node scripts/export-pages.mjs
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages-dist
      - id: deployment
        uses: actions/deploy-pages@v5
